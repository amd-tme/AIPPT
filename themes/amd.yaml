name: AMD Corporate
description: Black/white/gray with teal accent, matching corp.pptx template

# Colors extracted from ppt/theme/theme1.xml "AMD Palette" color scheme.
# dk1=000000, lt1=FFFFFF, dk2=5E5E5E, lt2=9D9FA2
# accent1=636466, accent2=9D9FA2, accent3=C1A968, accent4=F26522
# accent5=ED1C24, accent6=00C2DE, hlink=D5D5D5, folHlink=A9A9A9
#
# IMPORTANT: AMD slides are BLACK and WHITE. No navy, no dark blue.
# The template has zero blue tones — keep it grayscale + accent colors.

colors:
  background: "000000"
  background_alt: "000000"
  surface: "404040"
  text_primary: "FFFFFF"
  text_secondary: "A6A6A6"
  text_body: "D9D9D9"
  accent: "00C2DE"
  accent_alt: "C1A968"
  warning: "ED1C24"

fonts:
  heading: "Klavika"
  body: "Arial"
  mono: "Consolas"

logo:
  path: "themes/assets/amd-wordmark.png"
  position: "top-left"
  width_inches: 0.9
  height_inches: 0.26
  x_inches: 0.46            # top-left margin
  y_inches: 0.4             # top-left margin

slide:
  layout: "LAYOUT_WIDE"      # 13.33" × 7.5" — all guide coordinates use this size
  margin_inches: 0.64

footer:
  show: true
  text: ""
  show_slide_numbers: true

typography:
  title_size: 36
  heading_size: 32
  subtitle_size: 18
  body_size: 14
  small_size: 11
  eyebrow_size: 8
  eyebrow_bold: false
  eyebrow_char_spacing: 6
  stat_size: 48
  stat_bold: true
  stat_label_size: 16
  stat_desc_size: 13
  code_size: 14
  footer_size: 8

data_colors:
  series_1: ""
  series_2: ""
  series_3: ""
  positive: "1AA01A"
  negative: "D73D2B"
  neutral: ""

shadow:
  blur: 4
  offset: 2
  angle: 135
  color: "000000"
  opacity: 0.12

eyebrow:
  show: true
  dash_width: 1.2
  dash_height: 0.035
  label_offset: 1.35

# Slide master overrides (optional, used when createDeck({ useSlideMaster: true }))
# master:
#   title:
#     background: "000000"          # override title master bg (default: background_alt)
#   content:
#     background: "000000"          # override content master bg (default: background)
#   section_divider:
#     panel_width_pct: 18           # override left panel width (default: 18%)
